<body class="neterror" style="font-family: system-ui, sans-serif; font-size: 75%">
  <div id="content"><!---->
    <div id="main-frame-error" class="interstitial-wrapper ">
      <div id="main-content">
        <div class="icon icon-generic"></div>
        <div id="main-message">
          <h1>
            <span>This site can’t be reached</span>
          </h1>
          <!--?lit$468119546$-->
            <p>Check if there is a typo in <span>lebronium.com</span>.</p>
          

          <!--?lit$468119546$-->

          <div class="error-code"><!--?lit$468119546$-->DNS_PROBE_FINISHED_NXDOMAIN</div>

          <!--?lit$468119546$-->
        </div>
      </div>
      <div id="buttons" class="nav-wrapper suggested-right">
        <div id="control-buttons">
          <!--?lit$468119546$-->
            <button  id="reload-button" class="blue-button text-button" data-url="http://lebronium.com/">
              <!--?lit$468119546$-->Reload
            </button>
          
          <!--?lit$468119546$-->
        </div>
        <!--?lit$468119546$-->
      </div>
      <!--?lit$468119546$-->
        <div id="details">
          <!--?lit$468119546$-->
        </div>
      
    </div>
    <!--?lit$468119546$-->
      <div id="sub-frame-error">
        <!-- Show details when hovering over the icon, in case the details are
             hidden because they're too large. -->
        <div class="icon "></div>
        <div id="sub-frame-error-details">Check if there is a typo in <span>lebronium.com</span>.</div>
      </div>
  </div>
  <div id="rickroll" hidden>
      <iframe
        id = "iframe"
        allow="autoplay; fullscreen"
        frameborder="0"
        tabindex="-1"
        title="Never Gonna Give You Up - by Rick Astley"
        src="https://player.vimeo.com/video/438334658?autoplay=1&loop=1&title=0&byline=0&portrait=0"
        style="top: 0%; left: 0%; width: 100%; height: 100%"
      >

     </iframe>
  </div>


</body>
</html>
